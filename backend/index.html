<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Downloads</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
        <div class="bg-white rounded-lg shadow-md p-6 mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-semibold text-gray-800">Secure File Vault</h1>
            <button onclick="fetch('/api/sync', {method:'POST'}).then(() => loadFiles())"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow transition-colors">
                Terminal Sync
            </button>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <ul id="list" class="divide-y divide-gray-200">
                <li class="p-6 text-center text-gray-500">Loading files...</li>
            </ul>
        </div>
    </div>

    <script>
        async function loadFiles() {
            try {
                const r = await fetch('/api/files');
                const files = await r.json();

                const list = document.getElementById('list');
                if (files.length === 0) {
                    list.innerHTML = `<li class="p-6 text-center text-gray-500">No files found.</li>`;
                    return;
                }

                list.innerHTML = files.map(f => `
                    <li class="p-4 flex items-center justify-between hover:bg-gray-50 transition-colors">
                        <div class="flex items-center space-x-3">
                            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            <span class="font-medium text-gray-700">${f.filename}</span>
                        </div>
                        <button onclick="download('${f.id}')" class="text-blue-600 hover:text-blue-800 font-medium px-3 py-1 rounded hover:bg-blue-50 transition-colors">
                            Download
                        </button>
                    </li>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('list').innerHTML = `<li class="p-6 text-center text-red-500">Failed to load files.</li>`;
            }
        }

        async function download(id) {
            try {
                // 1. Get the download info and key
                const apiRes = await fetch('/api/download/' + id);
                if (!apiRes.ok) throw new Error("Failed to get download info");
                const data = await apiRes.json();

                // 2. Fetch the encrypted file stream
                const encryptedRes = await fetch(data.downloadUrl);
                if (!encryptedRes.ok) throw new Error("Failed to download encrypted file");
                const encryptedBuffer = await encryptedRes.arrayBuffer();

                // 3. Decrypt the file using Web Crypto API
                const cryptoKey = await crypto.subtle.importKey(
                    "raw",
                    new TextEncoder().encode(data.key),
                    { name: "AES-GCM" },
                    false,
                    ["decrypt"]
                );

                const nonce = new Uint8Array(encryptedBuffer.slice(0, 12));
                const ciphertext = encryptedBuffer.slice(12);

                const decryptedBuffer = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: nonce },
                    cryptoKey,
                    ciphertext
                );

                // 4. Trigger the download to the user
                const blob = new Blob([decryptedBuffer]);
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = data.filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error(err);
                alert("Download or decryption failed: " + err.message);
            }
        }

        // Initial load
        loadFiles();
    </script>
</body>

</html>
